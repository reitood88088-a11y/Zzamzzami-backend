<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>짬짬이 - 학습 분석 탭</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #83539D; --text-main: #1A1A1A; --text-muted: #666666;
            --canvas: #FFFFFF; --hairline: #E5E5E5; --block-cream: #F7F4EE;
            --block-lilac: #E5DEFA;
            --rounded-lg: 24px; --rounded-pill: 50px; --rounded-full: 9999px;
        }

        body { margin: 0; background-color: #E5E5E5; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Pretendard', sans-serif; color: var(--text-main); }

        .mobile-container { width: 390px; height: 844px; background-color: var(--canvas); border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); position: relative; overflow: hidden; display: flex; flex-direction: column; border: 8px solid var(--text-main); }

        .status-bar { width: 100%; height: 47px; display: flex; justify-content: space-between; align-items: center; padding: 0 28px; box-sizing: border-box; background-color: var(--primary); color: var(--canvas); z-index: 30; font-size: 15px; font-weight: 600; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background-color: var(--primary); z-index: 30; }
        .header h1 { font-size: 22px; font-weight: 800; color: var(--canvas); margin: 0; letter-spacing: -1px; }
        .header .profile-btn { width: 36px; height: 36px; border-radius: var(--rounded-full); border: 2px solid var(--canvas); color: var(--canvas); display: flex; justify-content: center; align-items: center; }

        .main-content { flex: 1; padding: 24px; background-color: var(--block-cream); overflow-y: auto; }
        
        .lang-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab-btn { padding: 8px 20px; border-radius: var(--rounded-pill); border: 1px solid var(--hairline); background-color: var(--canvas); font-size: 14px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background-color: var(--primary); color: var(--canvas); border: none; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .stat-card { background-color: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--rounded-lg); padding: 16px 8px; display: flex; flex-direction: column; align-items: center; }
        .stat-card h3 { font-size: 11px; color: var(--text-muted); margin: 0 0 8px 0; text-align: center; }
        .stat-card .value { font-size: 18px; font-weight: 700; color: var(--primary); }

        .chart-card { background-color: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--rounded-lg); padding: 24px; margin-bottom: 24px; }
        .chart-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
        .bar-chart { display: flex; justify-content: space-between; align-items: flex-end; height: 120px; padding-top: 10px; }
        .bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .bar { width: 24px; background-color: var(--hairline); border-radius: 4px; }
        .bar.active { background-color: var(--primary); }
        .bar-label { font-size: 12px; color: var(--text-muted); }

        .time-saved-bubble {
            background-color: var(--block-lilac);
            border-radius: var(--rounded-lg);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid var(--primary);
        }
        .time-saved-icon { font-size: 28px; color: var(--primary); }
        .time-saved-text { font-size: 15px; font-weight: 600; line-height: 1.4; color: var(--text-main); }

        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 80px; background-color: var(--canvas); border-top: 1px solid var(--hairline); display: flex; justify-content: space-around; align-items: center; padding-bottom: 12px; box-sizing: border-box; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); cursor: pointer; width: 50px; }
        .nav-item.current-tab { color: var(--primary); }
        .nav-item.active-home .icon-wrapper { width: 56px; height: 56px; background-color: var(--primary); border-radius: var(--rounded-full); display: flex; justify-content: center; align-items: center; color: var(--canvas); border: 4px solid var(--canvas); box-shadow: 0 4px 12px rgba(131, 83, 157, 0.3); }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="status-bar">
            <span>9:41</span>
            <div class="icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></div>
        </div>
        <header class="header">
            <div class="menu-btn"><i class="fa-solid fa-bars" style="color:white; font-size: 28px;"></i></div>
            <h1>짬짬이</h1>
            <div class="profile-btn"><i class="fa-regular fa-user"></i></div>
        </header>

        <div class="main-content">
            <div class="lang-tabs">
                <button class="tab-btn active">English</button>
                <button class="tab-btn">Chinese</button>
                <button class="tab-btn">Japanese</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card"> <h3>Weekly Time</h3> <span class="value">12h</span> </div>
                <div class="stat-card"> <h3>Accuracy</h3> <span class="value">92%</span> </div>
                <div class="stat-card"> <h3>Streak</h3> <span class="value">14일</span> </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">Weekly Learning Time</div>
                <div class="bar-chart">
                    <div class="bar-wrap"><div class="bar" style="height: 40px;"></div><span class="bar-label">M</span></div>
                    <div class="bar-wrap"><div class="bar active" style="height: 80px;"></div><span class="bar-label">T</span></div>
                    <div class="bar-wrap"><div class="bar" style="height: 50px;"></div><span class="bar-label">W</span></div>
                    <div class="bar-wrap"><div class="bar active" style="height: 90px;"></div><span class="bar-label">T</span></div>
                    <div class="bar-wrap"><div class="bar" style="height: 30px;"></div><span class="bar-label">F</span></div>
                    <div class="bar-wrap"><div class="bar active" style="height: 100px;"></div><span class="bar-label">S</span></div>
                    <div class="bar-wrap"><div class="bar" style="height: 60px;"></div><span class="bar-label">S</span></div>
                </div>
            </div>

            <div class="time-saved-bubble">
                <div class="time-saved-icon"><i class="fa-solid fa-train"></i></div>
                <div class="time-saved-text">한 사람이 인생에서 교통수단을 타느라 낭비하는 시간, 2년을 벌고 있습니다!</div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item"> <i class="fa-solid fa-camera"></i> <span>스캔</span> </div>
            <div class="nav-item"> <i class="fa-solid fa-layer-group"></i> <span>복습</span> </div>
            <div class="nav-item active-home"> <div class="icon-wrapper"><i class="fa-solid fa-house"></i></div> <span>홈</span> </div>
            <div class="nav-item"> <i class="fa-solid fa-bolt"></i> <span>퀴즈</span> </div>
            <div class="nav-item current-tab"> <i class="fa-solid fa-chart-simple"></i> <span>분석</span> </div>
        </nav>
    </div>
</body>
</html>
