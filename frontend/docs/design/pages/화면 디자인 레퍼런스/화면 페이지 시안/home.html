<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>짬짬이 - 홈탭</title>
    <!-- 폰트: Pretendard -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <!-- 아이콘: FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 디자인 가이드라인 토큰 적용 */
        :root {
            /* Colors */
            --primary: #83539D; /* Royal Lilac */
            --text-main: #1A1A1A; /* Off-Black */
            --text-muted: #666666; /* Subtitle gray */
            --canvas: #FFFFFF; /* Pure White */
            --surface-soft: #F2F2F2; /* Soft Gray */
            --hairline: #E5E5E5; /* Border Gray */
            --block-cream: #F7F4EE; /* Pastel Cream */
            --block-lilac: #E5DEFA; /* Pastel Lilac */
            
            /* Diary Spine Colors for categorization */
            --spine-toeic: var(--primary);
            --spine-hsk: #E88B81; /* Soft Coral */
            --spine-jlpt: #7BBA9B; /* Soft Sage Green */

            /* Spacing & Radii */
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            
            --rounded-md: 8px;
            --rounded-lg: 24px;
            --rounded-pill: 50px;
            --rounded-full: 9999px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #E5E5E5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Pretendard', sans-serif;
            color: var(--text-main);
        }

        /* 모바일 디바이스 컨테이너 */
        .mobile-container {
            width: 390px;
            height: 844px;
            background-color: var(--canvas);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 8px solid var(--text-main);
        }

        /* 상태바 */
        .status-bar {
            width: 100%;
            height: 47px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 28px;
            box-sizing: border-box;
            font-size: 15px;
            font-weight: 600;
            background-color: var(--primary); /* 브랜드 컬러로 변경 */
            color: var(--canvas); /* 상태바 아이콘/글씨 흰색으로 변경 */
            z-index: 10;
        }
        .status-bar .icons { display: flex; gap: 6px; font-size: 14px; }

        /* 상단 헤더 (GNB) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background-color: var(--primary); /* 브랜드 컬러로 변경 */
            z-index: 30;
        }
        .header .menu-btn {
            font-size: 28px;
            color: var(--canvas); /* 아이콘 흰색으로 변경 */
            cursor: pointer;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--canvas); /* 로고 흰색으로 변경 */
            margin: 0;
            letter-spacing: -1px;
        }
        .header .profile-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--rounded-full);
            background-color: transparent; /* 배경 투명하게 */
            border: 2px solid var(--canvas); /* 테두리 흰색으로 변경 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: var(--canvas); /* 아이콘 흰색으로 변경 */
            cursor: pointer;
        }

        /* 메인 스크롤 영역 */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px; /* 하단 네비바 공간 확보 */
        }
        /* 스크롤바 숨기기 */
        .main-content::-webkit-scrollbar { display: none; }

        /* 책장 섹션 (과목별 분류) */
        .bookshelf {
            padding: var(--spacing-xl) 0;
            border-bottom: 1px solid var(--hairline);
        }
        /* 파스텔 톤 교차 배경으로 책장 구분 */
        .bookshelf:nth-child(even) {
            background-color: var(--block-cream);
        }

        .bookshelf-header {
            padding: 0 var(--spacing-lg);
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
        }
        
        /* 알약 형태의 타이틀 뱃지 (스케치 반영) */
        .subject-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 16px;
            border-radius: var(--rounded-pill);
            border: 2px solid var(--text-main);
            font-size: 16px;
            font-weight: 700;
            background-color: var(--canvas);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* 다이어리 가로 스크롤 영역 */
        .diary-scroll-container {
            display: flex;
            gap: var(--spacing-md);
            padding: 0 var(--spacing-lg);
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            /* 스와이프 어포던스를 위해 오른쪽 패딩 여유 주기 */
            padding-right: var(--spacing-xl);
        }
        .diary-scroll-container::-webkit-scrollbar { display: none; }

        /* 다이어리 카드 컴포넌트 */
        .diary-card {
            flex: 0 0 auto;
            width: 130px;
            height: 160px;
            background-color: var(--canvas);
            border-radius: 4px 16px 16px 4px; /* 실제 책 같은 라운드 처리 */
            border: 1px solid var(--hairline);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.03); /* 아주 미세한 플랫 뎁스 */
            cursor: pointer;
        }

        /* 다이어리 책등(Spine) 및 제본 디테일 */
        .diary-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 14px;
            border-radius: 4px 0 0 4px;
        }
        /* 다이어리 접히는 선 디테일 */
        .diary-card::after {
            content: '';
            position: absolute;
            left: 14px;
            top: 0;
            bottom: 0;
            width: 1px;
            background-color: rgba(0,0,0,0.1);
        }

        /* 과목별 책등 색상 지정 */
        .subject-toeic .diary-card::before { background-color: var(--spine-toeic); }
        .subject-hsk .diary-card::before { background-color: var(--spine-hsk); }
        .subject-jlpt .diary-card::before { background-color: var(--spine-jlpt); }

        /* 다이어리 내부 텍스트 */
        .diary-date {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-main);
            margin-bottom: 4px;
            padding-left: 10px; /* 책등 피해서 패딩 */
        }
        .diary-items {
            font-size: 13px;
            color: var(--text-muted);
            padding-left: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 오늘 스캔한 새로운 데이터 강조 (가장 왼쪽) */
        .diary-card.new-entry {
            border: 2px solid var(--primary);
        }
        .new-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: var(--primary);
            color: var(--canvas);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: var(--rounded-pill);
        }

        /* 하단 네비게이션 바 (GNB) */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background-color: var(--canvas);
            border-top: 1px solid var(--hairline);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 12px; /* 아이폰 하단 바 공간 고려 */
            box-sizing: border-box;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            cursor: pointer;
            width: 50px;
        }
        .nav-item i {
            font-size: 22px;
        }
        .nav-item span {
            font-size: 11px;
            font-weight: 500;
        }

        /* 홈 버튼 강조 (가운데 플로팅 스타일) */
        .nav-item.active-home {
            position: relative;
            top: -16px; /* 위로 띄우기 */
        }
        .nav-item.active-home .icon-wrapper {
            width: 56px;
            height: 56px;
            background-color: var(--primary);
            border-radius: var(--rounded-full);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--canvas);
            box-shadow: 0 4px 12px rgba(131, 83, 157, 0.3);
            border: 4px solid var(--canvas); /* 배경과 분리감 */
        }
        .nav-item.active-home span {
            color: var(--text-main);
            font-weight: 700;
            margin-top: 2px;
        }

    </style>
</head>
<body>
    <div class="mobile-container">
        <!-- 상태바 목업 -->
        <div class="status-bar">
            <span>9:41</span>
            <div class="icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <!-- 상단 헤더 -->
        <header class="header">
            <div class="menu-btn"><i class="fa-solid fa-bars"></i></div>
            <h1>짬짬이</h1>
            <div class="profile-btn"><i class="fa-regular fa-user"></i></div>
        </header>

        <!-- 메인 콘텐츠 영역 -->
        <div class="main-content">
            
            <!-- 1. TOEIC 책장 (가장 최신/많이 쓰는 과목) -->
            <section class="bookshelf subject-toeic">
                <div class="bookshelf-header">
                    <span class="subject-badge">TOEIC</span>
                </div>
                <div class="diary-scroll-container">
                    <!-- 스케치 반영: 가장 최신 날짜가 왼쪽 -->
                    <div class="diary-card new-entry">
                        <span class="new-badge">NEW</span>
                        <div class="diary-date">6/15</div>
                        <div class="diary-items"><i class="fa-solid fa-check"></i> 12 문장</div>
                    </div>
                    <div class="diary-card">
                        <div class="diary-date">6/14</div>
                        <div class="diary-items"><i class="fa-solid fa-check"></i> 8 문장</div>
                    </div>
                    <div class="diary-card">
                        <div class="diary-date">6/13</div>
                        <div class="diary-items"><i class="fa-solid fa-check"></i> 15 문장</div>
                    </div>
                    <div class="diary-card">
                        <div class="diary-date">6/12</div>
                        <div class="diary-items"><i class="fa-solid fa-check"></i> 5 문장</div>
                    </div>
                </div>
            </section>

            <!-- 2. HSK 책장 (배경색 크림톤 교차) -->
            <section class="bookshelf subject-hsk">
                <div class="bookshelf-header">
                    <span class="subject-badge">HSK</span>
                </div>
                <div class="diary-scroll-container">
                    <div class="diary-card">
                        <div class="diary-date">6/15</div>
                        <div class="diary-items"><i class="fa-solid fa-check"></i> 20 단어</div>
                    </div>
                    <div class="diary-card">
                        <div class="diary-date">6/14</div>
                        <div class="diary-items"><i class="fa-solid fa-check"></i> 15 단어</div>
                    </div>
                    <div class="diary-card">
                        <div class="diary-date">6/13</div>
                        <div class="diary-items"><i class="fa-solid fa-check"></i> 18 단어</div>
                    </div>
                </div>
            </section>

            <!-- 3. JLPT 책장 -->
            <section class="bookshelf subject-jlpt">
                <div class="bookshelf-header">
                    <span class="subject-badge">JLPT</span>
                </div>
                <div class="diary-scroll-container">
                    <div class="diary-card">
                        <div class="diary-date">6/15</div>
                        <div class="diary-items"><i class="fa-solid fa-check"></i> 10 문장</div>
                    </div>
                    <div class="diary-card">
                        <div class="diary-date">6/14</div>
                        <div class="diary-items"><i class="fa-solid fa-check"></i> 9 문장</div>
                    </div>
                    <div class="diary-card">
                        <div class="diary-date">6/13</div>
                        <div class="diary-items"><i class="fa-solid fa-check"></i> 12 문장</div>
                    </div>
                </div>
            </section>
        </div>

        <!-- 하단 네비게이션 바 (GNB) -->
        <nav class="bottom-nav">
            <div class="nav-item">
                <i class="fa-solid fa-camera"></i>
                <span>스캔</span>
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-layer-group"></i>
                <span>복습</span>
            </div>
            <!-- 홈 버튼 강조 -->
            <div class="nav-item active-home">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-house"></i>
                </div>
                <span>홈</span>
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-bolt"></i>
                <span>퀴즈</span>
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-chart-simple"></i>
                <span>분석</span>
            </div>
        </nav>
    </div>
</body>
</html>
